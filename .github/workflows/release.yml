name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build package
        run: python -m build

      # PyPI Trusted Publishing setup required before this workflow can publish:
      # 1. Create/claim the PyPI project named "apidiom".
      # 2. In PyPI project settings, add a Trusted Publisher for this GitHub repo.
      # 3. Use workflow filename ".github/workflows/release.yml".
      # 4. Use environment name "pypi" if you keep the environment below.
      # 5. Do not add a PyPI API token; this workflow uses GitHub OIDC.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
